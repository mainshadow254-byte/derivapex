<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ApexBot — Demo Charts</title>
  <link rel="stylesheet" href="css/styles.css?v=20260620-2" />
  <style>
    .ctrl{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
    #demo-chart{height:420px}
    .readout{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;margin:8px 0;color:var(--muted)}
    .readout b{color:#e2e8f0}
    .layout{display:grid;gap:16px;grid-template-columns:1fr}
    @media(min-width:1100px){.layout{grid-template-columns:minmax(0,1fr) 340px}}
  </style>
</head>
<body class="app-body">
  <nav class="nav">
    <a class="brand" href="index.html">ApexBot</a>
    <div id="demo-nav"></div>
  </nav>

  <div class="container layout">
    <div class="terminal-shell section-card">
      <div class="ctrl">
        <h3 style="margin:0">Charts <span class="demo-tag">DEMO</span></h3>
        <select id="market" class="input" style="max-width:220px"></select>
        <select id="type" class="input" style="max-width:150px">
          <option value="candlestick">Candlestick</option>
          <option value="ohlc">OHLC bars</option>
          <option value="line">Line</option>
          <option value="area">Area</option>
          <option value="tick">Tick</option>
        </select>
        <select id="gran" class="input" style="max-width:140px"></select>
      </div>
      <div class="readout">
        <span>O <b id="r-o">—</b></span><span>H <b id="r-h">—</b></span><span>L <b id="r-l">—</b></span>
        <span>C <b id="r-c">—</b></span><span>Price <b id="r-q">—</b></span><span>Tick vol <b id="r-vol">—</b></span>
      </div>
      <div id="demo-chart"></div>
    </div>

    <div class="card section-card">
      <h3 style="margin-top:0">AI Chart Analysis <span class="demo-tag">DEMO</span></h3>
      <div id="ai"><p class="muted">Loading analysis…</p></div>
    </div>
  </div>

  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script src="apex-config.js"></script>
  <script src="js/config.js"></script>
  <script src="js/demo.js"></script>
  <script>
    DEMO.mountChrome('demo-terminal.html');
    const $ = (id)=>document.getElementById(id);
    let chart, series, liveWS, appId='1089', tickCount=0;

    async function init(){
      const cfg = await loadPublicConfig(); appId = cfg.derivAppId || '1089';

      // Timeframes
      let tfs = [{value:60,label:'1 Minute'},{value:300,label:'5 Minutes'},{value:900,label:'15 Minutes'},{value:1800,label:'30 Minutes'},{value:3600,label:'1 Hour'},{value:14400,label:'4 Hours'},{value:86400,label:'Daily'}];
      try { const r = await DEMO.get('/timeframes'); if (r.timeframes?.length) tfs = r.timeframes.filter(t=>t.value>0); } catch {}
      $('gran').innerHTML = tfs.map(t=>`<option value="${t.value}">${t.label}</option>`).join('');

      // Markets
      let first='R_100';
      try {
        const { groups } = await DEMO.get('/symbols');
        const sel=$('market'); sel.innerHTML='';
        Object.entries(groups).forEach(([market,arr])=>{
          const og=document.createElement('optgroup'); og.label=market;
          arr.forEach(s=>{ const o=document.createElement('option'); o.value=s.symbol; o.textContent=s.name; og.appendChild(o); });
          sel.appendChild(og);
        });
        first = sel.value || first;
      } catch { $('market').innerHTML='<option value="R_100">Volatility 100</option>'; }

      chart = LightweightCharts.createChart($('demo-chart'), {
        layout:{ background:{ color:'transparent' }, textColor:'#94a3b8' },
        grid:{ vertLines:{ color:'#1e293b' }, horzLines:{ color:'#1e293b' } },
        timeScale:{ timeVisible:true }, autoSize:true,
      });

      $('market').onchange = ()=>{ load(); connectLive(); refreshAI(); };
      $('type').onchange = load;
      $('gran').onchange = ()=>{ load(); refreshAI(); };

      await load(); connectLive(); refreshAI();
      setInterval(refreshAI, 15000);
    }

    function newSeries(type){
      if (series) { try { chart.removeSeries(series); } catch {} series=null; }
      if (type==='candlestick') series = chart.addCandlestickSeries();
      else if (type==='ohlc') series = chart.addBarSeries();
      else if (type==='area') series = chart.addAreaSeries({ lineColor:'#6366f1', topColor:'#6366f155', bottomColor:'#6366f100' });
      else series = chart.addLineSeries({ color:'#6366f1' }); // line / tick
      return series;
    }

    async function load(){
      const symbol=$('market').value, type=$('type').value, gran=+$('gran').value;
      newSeries(type);
      try {
        if (type==='tick') {
          const { ticks } = await DEMO.get(`/ticks?symbol=${encodeURIComponent(symbol)}&count=500`);
          series.setData((ticks||[]).map(t=>({ time:t.t, value:t.q })));
          if (ticks?.length){ const last=ticks[ticks.length-1]; $('r-q').textContent=(+last.q).toFixed(4); }
        } else {
          const { candles } = await DEMO.get(`/candles?symbol=${encodeURIComponent(symbol)}&granularity=${gran}&count=300`);
          if (type==='line' || type==='area') series.setData((candles||[]).map(c=>({ time:c.t, value:c.c })));
          else series.setData((candles||[]).map(c=>({ time:c.t, open:c.o, high:c.h, low:c.l, close:c.c })));
          if (candles?.length){ const c=candles[candles.length-1]; $('r-o').textContent=(+c.o).toFixed(4); $('r-h').textContent=(+c.h).toFixed(4); $('r-l').textContent=(+c.l).toFixed(4); $('r-c').textContent=(+c.c).toFixed(4); }
        }
        chart.timeScale().fitContent();
      } catch (e) { /* keep chart, ignore transient */ }
    }

    // Live ticks straight from Deriv's PUBLIC websocket (no auth) for the readout.
    function connectLive(){
      try { liveWS && liveWS.close(); } catch {}
      tickCount=0;
      const symbol=$('market').value;
      liveWS = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${appId}`);
      liveWS.onopen = ()=> liveWS.send(JSON.stringify({ ticks: symbol, subscribe: 1 }));
      liveWS.onmessage = (ev)=>{
        const m = JSON.parse(ev.data);
        if (m.msg_type==='tick' && m.tick){
          const q = parseFloat(m.tick.quote);
          $('r-q').textContent = q.toFixed(4);
          $('r-vol').textContent = (++tickCount);
          if ($('type').value==='tick' && series){ series.update({ time:m.tick.epoch, value:q }); }
        }
      };
      liveWS.onclose = ()=> setTimeout(connectLive, 4000);
    }

    async function refreshAI(){
      const symbol=$('market').value, gran=+$('gran').value;
      try {
        const a = await DEMO.get(`/analysis?symbol=${encodeURIComponent(symbol)}&granularity=${gran}`);
        const trendLabel = a.trend?.bias || a.trend?.direction || a.trend || '—';
        const volatilityLabel = a.volatility?.level
          ? `${a.volatility.level} (${a.volatility.atrPct ?? '—'}% ATR)`
          : (a.volatility ?? '—');
        const reasons = Array.isArray(a.reasons)
          ? a.reasons
          : Object.values(a.reasons || {}).filter(Boolean);
        $('ai').innerHTML = `
          <div class="muted" style="font-size:13px">Trend: <b>${trendLabel}</b> · Volatility: <b>${volatilityLabel}</b> · Confidence: <b>${a.confidence ?? '—'}%</b> · Risk score: <b>${a.risk ?? a.riskLevel ?? '—'}</b></div>
          ${reasons.length?`<ul style="font-size:13px;margin:8px 0 0;padding-left:18px">${reasons.map(r=>`<li>${r}</li>`).join('')}</ul>`:''}
          ${(a.support||a.resistance)?`<div class="muted" style="font-size:12px;margin-top:8px">🟢 Support: ${(a.support||[]).map(v=>(+v).toFixed(4)).join(', ')||'—'} · 🔴 Resistance: ${(a.resistance||[]).map(v=>(+v).toFixed(4)).join(', ')||'—'}</div>`:''}
          <div class="muted" style="font-size:11px;margin-top:8px">${a.riskWarning||'No outcome is guaranteed.'}</div>`;
      } catch (e) {
        $('ai').innerHTML = `<p class="muted">${e.status===425?'Not enough candle data yet — try again shortly.':e.message}</p>`;
      }
    }

    init();
  </script>
</body>
</html>
