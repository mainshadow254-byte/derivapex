<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ApexBot — Demo AI Scanner</title>
  <link rel="stylesheet" href="css/styles.css?v=20260620-2" />
  <link rel="stylesheet" href="css/product-loop.css?v=20260702-1" />
</head>
<body class="app-body">
  <nav class="nav"><a class="brand" href="index.html">ApexBot</a><div id="demo-nav"></div></nav>
  <div class="container">
    <div class="card page-hero">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div>
          <span class="platform-kicker">Market intelligence</span>
          <h2 style="margin:0">Multi-indicator AI Safety Scanner <span class="demo-tag">DEMO</span></h2>
          <p class="muted" style="margin:4px 0 0;font-size:13px">Live Deriv ticks · EMA, MACD, RSI, Bollinger, stochastic, volatility, confluence and safer alternatives. No login required.</p>
        </div>
        <button id="rescan" class="btn">Scan all markets</button>
      </div>
      <div class="card" style="margin-top:12px;background:#0d1426">
        <div class="row" style="gap:8px;align-items:flex-end;flex-wrap:wrap">
          <div style="flex:1;min-width:220px"><label class="label">Scan one market</label><input id="single-symbol" class="input" placeholder="Example: R_100, R_75, BOOM500, CRASH500" value="R_100" /></div>
          <button id="scan-one" class="btn ghost" type="button">Analyze symbol</button>
          <button id="chart-one" class="btn ghost" type="button">Analyze chart</button>
        </div>
      </div>
      <div id="scan-warning" style="margin-top:10px"></div>
      <div id="scan-results" class="grid cols-2" style="margin-top:12px"></div>
    </div>
  </div>
  <script src="apex-config.js"></script>
  <script src="js/config.js"></script>
  <script src="js/demo.js"></script>
  <script src="js/demo-scanner-upgrade.js?v=20260702-1"></script>
  <script>
    DEMO.mountChrome('demo-scanner.html');
    document.getElementById('rescan').onclick = ApexDemoScanner.scanAll;
    document.getElementById('scan-one').onclick = ApexDemoScanner.scanOne;
    document.getElementById('chart-one').onclick = ApexDemoScanner.chartOne;
    ApexDemoScanner.scanAll();
    setInterval(ApexDemoScanner.scanAll, 20000);
  </script>
</body>
</html>
